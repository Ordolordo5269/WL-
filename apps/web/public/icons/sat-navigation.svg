<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Central hexagonal body -->
  <polygon points="16,7 20,9.5 20,14.5 16,17 12,14.5 12,9.5" fill="#C8841A" stroke="#8B5A0E" stroke-width="0.6"/>
  <!-- Body detail lines -->
  <line x1="12" y1="9.5" x2="20" y2="9.5" stroke="#8B5A0E" stroke-width="0.4" opacity=".6"/>
  <line x1="12" y1="14.5" x2="20" y2="14.5" stroke="#8B5A0E" stroke-width="0.4" opacity=".6"/>
  <!-- Left solar panel -->
  <rect x="1" y="10" width="10" height="7" rx="0.4" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <line x1="3.5" y1="10" x2="3.5" y2="17" stroke="#0C447C" stroke-width="0.35"/>
  <line x1="6" y1="10" x2="6" y2="17" stroke="#0C447C" stroke-width="0.35"/>
  <line x1="8.5" y1="10" x2="8.5" y2="17" stroke="#0C447C" stroke-width="0.35"/>
  <!-- Right solar panel -->
  <rect x="21" y="10" width="10" height="7" rx="0.4" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <line x1="23.5" y1="10" x2="23.5" y2="17" stroke="#0C447C" stroke-width="0.35"/>
  <line x1="26" y1="10" x2="26" y2="17" stroke="#0C447C" stroke-width="0.35"/>
  <line x1="28.5" y1="10" x2="28.5" y2="17" stroke="#0C447C" stroke-width="0.35"/>
  <!-- Panel connectors -->
  <line x1="11" y1="13.5" x2="12" y2="12" stroke="#8B5A0E" stroke-width="0.6"/>
  <line x1="20" y1="12" x2="21" y2="13.5" stroke="#8B5A0E" stroke-width="0.6"/>
  <!-- L-band navigation antenna (dish pointing down) -->
  <path d="M11 21 Q16 17.5 21 21" fill="none" stroke="#ffaa22" stroke-width="1.2"/>
  <line x1="16" y1="17" x2="16" y2="21" stroke="#ffaa22" stroke-width="0.7"/>
  <ellipse cx="16" cy="21.2" rx="5" ry="1.2" fill="none" stroke="#ffaa22" stroke-width="0.7" opacity=".7"/>
  <!-- Signal arcs -->
  <path d="M13 23.5 Q16 25.5 19 23.5" fill="none" stroke="#ffaa22" stroke-width="0.5" stroke-dasharray="1.5,1" opacity=".55"/>
  <path d="M11.5 25.5 Q16 28 20.5 25.5" fill="none" stroke="#ffaa22" stroke-width="0.4" stroke-dasharray="1.5,1.5" opacity=".35"/>
</svg>
