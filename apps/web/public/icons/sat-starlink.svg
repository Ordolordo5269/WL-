<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat-panel body (v2 style) -->
  <rect x="11" y="13" width="10" height="6" rx="1.5" fill="#1a1a2e" stroke="#EF9F27" stroke-width="0.5"/>
  <!-- Phased array face -->
  <rect x="12.5" y="14" width="7" height="4" rx="0.5" fill="#2d2d4a" stroke="#EF9F27" stroke-width="0.3"/>
  <!-- Array grid lines -->
  <line x1="14.5" y1="14" x2="14.5" y2="18" stroke="#EF9F27" stroke-width="0.2" opacity=".5"/>
  <line x1="16.5" y1="14" x2="16.5" y2="18" stroke="#EF9F27" stroke-width="0.2" opacity=".5"/>
  <line x1="18.5" y1="14" x2="18.5" y2="18" stroke="#EF9F27" stroke-width="0.2" opacity=".5"/>
  <line x1="12.5" y1="16" x2="19.5" y2="16" stroke="#EF9F27" stroke-width="0.2" opacity=".5"/>
  <!-- Solar panel left (single large) -->
  <rect x="1" y="14" width="9" height="4" rx="0.5" fill="#0d1b3e" stroke="#3b7dd8" stroke-width="0.4"/>
  <line x1="3.5" y1="14" x2="3.5" y2="18" stroke="#3b7dd8" stroke-width="0.3" opacity=".6"/>
  <line x1="6" y1="14" x2="6" y2="18" stroke="#3b7dd8" stroke-width="0.3" opacity=".6"/>
  <line x1="8" y1="14" x2="8" y2="18" stroke="#3b7dd8" stroke-width="0.3" opacity=".6"/>
  <!-- Solar panel right -->
  <rect x="22" y="14" width="9" height="4" rx="0.5" fill="#0d1b3e" stroke="#3b7dd8" stroke-width="0.4"/>
  <line x1="24" y1="14" x2="24" y2="18" stroke="#3b7dd8" stroke-width="0.3" opacity=".6"/>
  <line x1="26.5" y1="14" x2="26.5" y2="18" stroke="#3b7dd8" stroke-width="0.3" opacity=".6"/>
  <line x1="28.5" y1="14" x2="28.5" y2="18" stroke="#3b7dd8" stroke-width="0.3" opacity=".6"/>
  <!-- Laser interlink glow -->
  <circle cx="11.5" cy="16" r="0.8" fill="#EF9F27" opacity=".6"/>
  <circle cx="20.5" cy="16" r="0.8" fill="#EF9F27" opacity=".6"/>
  <!-- Downlink beams -->
  <line x1="14" y1="19" x2="11" y2="27" stroke="#EF9F27" stroke-width="0.4" stroke-dasharray="1,1.5" opacity=".5"/>
  <line x1="16" y1="19" x2="16" y2="28" stroke="#EF9F27" stroke-width="0.4" stroke-dasharray="1,1.5" opacity=".5"/>
  <line x1="18" y1="19" x2="21" y2="27" stroke="#EF9F27" stroke-width="0.4" stroke-dasharray="1,1.5" opacity=".5"/>
</svg>
